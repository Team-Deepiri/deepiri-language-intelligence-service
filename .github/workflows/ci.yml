name: Deepiri CI - deepiri-language-intelligence-service

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  ci:
    name: Install, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout service repository
        uses: actions/checkout@v4
        with:
          path: platform-services/backend/deepiri-language-intelligence-service

      - name: Checkout shared utils
        uses: actions/checkout@v4
        with:
          repository: Team-Deepiri/deepiri-shared-utils
          ref: dev
          path: platform-services/shared/deepiri-shared-utils

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: platform-services/backend/deepiri-language-intelligence-service/package-lock.json

      - name: Install shared utils dependencies
        working-directory: platform-services/shared/deepiri-shared-utils
        run: npm ci

      - name: Build shared utils
        working-directory: platform-services/shared/deepiri-shared-utils
        run: npm run build

      - name: Install service dependencies
        working-directory: platform-services/backend/deepiri-language-intelligence-service
        run: npm ci

      - name: Type check
        working-directory: platform-services/backend/deepiri-language-intelligence-service
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: platform-services/backend/deepiri-language-intelligence-service
        run: npm test -- --passWithNoTests

      - name: Build
        working-directory: platform-services/backend/deepiri-language-intelligence-service
        run: npm run build
