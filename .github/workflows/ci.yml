name: Deepiri CI - deepiri-language-intelligence-service

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read
  packages: read

jobs:
  ci:
    name: Test, Build & Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: backend/deepiri-language-intelligence-service

      - name: Checkout shared utils
        uses: actions/checkout@v4
        with:
          repository: Team-Deepiri/deepiri-shared-utils
          path: shared/deepiri-shared-utils

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/deepiri-language-intelligence-service/package-lock.json

      - name: Authenticate GitHub Packages
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > ~/.npmrc

      - name: Install shared utils dependencies
        run: npm install --ignore-scripts
        working-directory: shared/deepiri-shared-utils

      - name: Build shared utils
        run: npm run build
        working-directory: shared/deepiri-shared-utils

      - name: Install dependencies
        run: npm ci
        working-directory: backend/deepiri-language-intelligence-service

      - name: Type check
        run: npx tsc --noEmit
        working-directory: backend/deepiri-language-intelligence-service

      - name: Run tests
        run: npm test -- --passWithNoTests
        working-directory: backend/deepiri-language-intelligence-service

      - name: Build
        run: npm run build
        working-directory: backend/deepiri-language-intelligence-service

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/deepiri-language-intelligence-service/Dockerfile
          push: false
          load: true
          tags: deepiri-language-intelligence-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}

      - name: Verify container runs
        run: |
          docker run -d --name test-container \
            -e DATABASE_URL="postgresql://ci:ci@localhost:5432/ci_dummy" \
            deepiri-language-intelligence-service:ci
          sleep 8
          docker ps -a
          docker logs test-container
          docker inspect -f '{{.State.Running}}' test-container | grep -q true || \
            echo "::warning::Container not running — check logs above (DB/streaming connection failures are expected in CI)"
          docker stop test-container || true
