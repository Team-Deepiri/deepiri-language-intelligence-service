name: Deepiri CI - deepiri-language-intelligence-service

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read
  packages: read

jobs:
  ci:
    name: Test, Build & Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout service into monorepo layout
        uses: actions/checkout@v4
        with:
          path: platform-services/backend/deepiri-language-intelligence-service

      - name: Checkout shared-utils
        uses: actions/checkout@v4
        with:
          repository: Team-Deepiri/deepiri-shared-utils
          path: platform-services/shared/deepiri-shared-utils
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build shared-utils
        working-directory: platform-services/shared/deepiri-shared-utils
        run: npm ci --legacy-peer-deps && npm run build

      - name: Install service dependencies
        working-directory: platform-services/backend/deepiri-language-intelligence-service
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > ~/.npmrc
          npm install --legacy-peer-deps file:../../shared/deepiri-shared-utils
          npm ci --legacy-peer-deps

      - name: Type check
        working-directory: platform-services/backend/deepiri-language-intelligence-service
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: platform-services/backend/deepiri-language-intelligence-service
        run: npm test -- --passWithNoTests

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: platform-services
          file: platform-services/backend/deepiri-language-intelligence-service/Dockerfile
          push: false
          load: true
          tags: deepiri-language-intelligence-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify container runs
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          POSTGRES_CORE_PASSWORD: ${{ secrets.POSTGRES_CORE_PASSWORD }}
          INTERNAL_SERVICE_SECRET: ${{ secrets.INTERNAL_SERVICE_SECRET }}
        run: |
          docker run -d --name test-container \
            -e REDIS_PASSWORD="${REDIS_PASSWORD:-password}" \
            -e INTERNAL_SERVICE_SECRET="${INTERNAL_SERVICE_SECRET:-ci-dev-only-placeholder}" \
            -e DATABASE_URL="postgresql://deepiri:${POSTGRES_CORE_PASSWORD:-deepiripassword}@localhost:5432/deepiri" \
            deepiri-language-intelligence-service:ci
          sleep 8
          docker ps -a
          docker logs test-container
          docker inspect -f '{{.State.Running}}' test-container | grep -q true || \
            echo "::warning::Container not running — check logs above (DB/streaming connection failures are expected in CI)"
          docker stop test-container || true
